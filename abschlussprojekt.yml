---
- name: 🎓 Präsentationsstart Automatisierung
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:

    - name: 🎬 Präsentationssystem initialisieren
      debug:
        msg:
          - "=========================================="
          - "🎓 PRESENTATION CONTROL SYSTEM"
          - "=========================================="
          - ""
          - "Initialisiere Präsentationsmodus..."
          - "Bitte warten..."
          
    - name: ⏳ Initialisierung
      pause:
        seconds: 8


    - name: 🔌 Verbindungstest
      debug:
        msg:
          - "🔌 Prüfe Verbindungen..."
          - "✅ Steuerung verfügbar"
          - "✅ Präsentationsumgebung erreichbar"

    - name: Warten
      pause:
        seconds: 6


    - name: 📂 Präsentationsdateien prüfen
      debug:
        msg:
          - "📂 Überprüfe Präsentationsmaterial..."
          - "✅ Folien geladen"
          - "✅ Medien verfügbar"
          - "✅ Demo vorbereitet"

    - name: Folien laden
      pause:
        seconds: 10


    - name: 🎤 Sprecher-Modul aktivieren
      debug:
        msg:
          - "🎤 Prüfe Präsentationsstatus..."
          - ""
          - "🗣️ Stimme erkannt"
          - "🧠 Wissen geladen"
          - "😰 Nervosität erkannt"

    - name: Nervosität behandeln
      pause:
        seconds: 5


    - name: ☕ Notfallprüfung
      debug:
        msg:
          - "☕ Suche nach Kaffee..."
          - "⚠️ Kaffee nicht gefunden"
          - "➡️ Präsentation wird trotzdem gestartet"


    - name: 🔍 Letzte Kontrolle
      debug:
        msg:
          - "=========================================="
          - "🔍 FINALER SYSTEMCHECK"
          - "=========================================="
          - ""
          - "✔ Technik"
          - "✔ Präsentation"
          - "✔ Sprecher"
          - "✔ Publikum bereit"

    - name: Abschlussprüfung
      pause:
        seconds: 10


    - name: 🚦 Startfreigabe
      debug:
        msg:
          - ""
          - "=========================================="
          - "🚦 STARTFREIGABE ERTEILT"
          - "=========================================="
          - ""
          - "Präsentation startet in..."


    - name: Countdown 5
      debug:
        msg: "5..."

    - pause:
        seconds: 1

    - name: Countdown 4
      debug:
        msg: "4..."

    - pause:
        seconds: 1

    - name: Countdown 3
      debug:
        msg: "3..."

    - pause:
        seconds: 1

    - name: Countdown 2
      debug:
        msg: "2..."

    - pause:
        seconds: 1

    - name: Countdown 1
      debug:
        msg: "1..."

    - pause:
        seconds: 2


    - name: 🎓 Präsentation gestartet
      debug:
        msg:
          - ""
          - "=========================================="
          - "🎓 ABSCHLUSSPRÄSENTATION GESTARTET"
          - "=========================================="
          - ""
          - "Vielen Dank für Ihre Aufmerksamkeit!"
